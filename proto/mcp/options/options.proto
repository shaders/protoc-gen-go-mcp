syntax = "proto3";

package mcp.options;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/shaders/protoc-gen-go-mcp/pkg/options;options";

extend google.protobuf.FieldOptions {
  // Marks an integer field as zero-based in the underlying gRPC API,
  // but presented as one-based in the MCP tool schema.
  // The generated MCP wrapper will decrement the value by 1 before
  // forwarding to gRPC, and the JSON-Schema will set minimum=1 and
  // adjust the description.
  bool zero_based_pagination = 52001;
}

// ToolOptions carries the first-class MCP tool metadata for an rpc method.
// It is the single source of truth for the generated tool's name, title and
// behavioral hints. The tool description is NOT here: it is taken from the
// method's leading comment, and per-parameter descriptions from the request
// message field leading comments.
//
// The four hints are tri-state (proto3 optional): a hint that is not set is
// omitted from the generated mcp.ToolAnnotation, so MCP clients keep applying
// the spec defaults (readOnlyHint=false, destructiveHint=true,
// idempotentHint=false, openWorldHint=true); a hint that is set is emitted
// explicitly with the given value.
message ToolOptions {
  // Required. The MCP tool name. Must be snake_case matching
  // ^[a-z][a-z0-9_]{1,63}$ (2-64 characters; the 2-char minimum is a
  // deliberate quality gate) and globally unique across all exposed tools.
  // With require_tool_annotation this is the ONLY source of the tool name;
  // there is no autogenerated fallback.
  string name = 1;
  // Optional human-readable title, <= 60 characters (enforced by the
  // generator).
  string title = 2;
  // If true, the tool does not modify its environment.
  optional bool read_only = 3;
  // If true, the tool may perform irreversible or destructive updates.
  // Meaningful only when read_only is false.
  optional bool destructive = 4;
  // If true, repeated calls with the same arguments have no additional effect.
  // Meaningful only when read_only is false.
  optional bool idempotent = 5;
  // If true, the tool may interact with an "open world" of external entities
  // (e.g. web search, email delivery, third-party APIs).
  optional bool open_world = 6;
}

extend google.protobuf.MethodOptions {
  // First-class MCP tool metadata for the annotated rpc method.
  ToolOptions tool = 52050;
}
